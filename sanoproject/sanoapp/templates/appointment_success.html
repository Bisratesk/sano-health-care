<!DOCTYPE html>

<html>

<head>

<title>Appointment Booked</title>


<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start; /* move card toward the top */
    background:#eefaff;
    padding:60px 15px 20px;
    font-family:"Segoe UI", Arial, sans-serif;
}

.card{
    width:100%;
    max-width:430px;
    background:white;
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}


h1{

color:#0077b6;

}


button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:30px;
    background:#0077b6;
    color:white;
    font-size:16px;
    cursor:pointer;
}


button:hover{

background:#023e8a;

}
@media (max-width:480px){
    body{
        padding-top:35px;
    }

    .card{
        padding:28px 18px;
    }
}

</style>

</head>


<body>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<div class="card">


<h1>
✅ Appointment Booked!
</h1>


<p>

Your appointment request has been sent successfully.

</p>


<p>

You can track your appointment status anytime.

</p>



<a href="{% url 'my_appointments' %}">

<button>

View My Appointments

</button>

</a>




</div>



</body>

</html>
