<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | SANO Health Care</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0b8fd8,#1fb8b8);
}

.container{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#0b8fd8;
    font-size:32px;
    margin-bottom:8px;
}

.logo p{
    color:#666;
    font-size:15px;
}

form p{
    margin-bottom:18px;
}

form label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    color:#333;
}

form input{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

form input:focus{
    outline:none;
    border-color:#0b8fd8;
    box-shadow:0 0 8px rgba(11,143,216,.25);
}
.password-box{

    display:flex;
    align-items:center;
    position:relative;

}


.password-box input{

    width:100%;
    padding-right:50px;

}



.eye-btn{

    position:absolute;

    right:12px;

    width:35px;

    height:35px;

    border:none;

    background:transparent;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

}



.eye-btn svg{

    width:22px;

    height:22px;

    fill:#0077b6;

    transition:.3s;

}



.eye-btn:hover svg{

    fill:#023e8a;

    transform:scale(1.15);

}
.helptext{
    display:block;
    margin-top:5px;
    font-size:13px;
    color:#777;
}

ul.errorlist{
    list-style:none;
    margin-bottom:10px;
    color:red;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    background:#0b8fd8;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0975b3;
    transform:translateY(-2px);
}

.login-link{
    text-align:center;
    margin-top:20px;
    color:#555;
}

.login-link a{
    color:#0b8fd8;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <h1>SANO</h1>
        <p>Create your Health Care Account</p>
    </div>

    <form method="POST">

        {% csrf_token %}

<p>
<label>
Username
</label>

{{form.username.errors}}
{{form.username}}

</p>


<div>

<label>Password</label>

{{ form.password.errors }}

<div class="password-box">

    {{ form.password }}

    <button
        type="button"
        class="eye-btn"
        onclick="showPassword()">

        <svg id="eyeIcon"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24">

            <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>

            <circle cx="12" cy="12" r="2.5"/>

        </svg>

    </button>

</div>

</div>



</p>

        <button type="submit">
            Create Account
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </div>

</div>
<script>

function showPassword(){

let password=document.getElementById("password");
let icon=document.getElementById("eyeIcon");


if(password.type==="password"){

    password.type="text";

    icon.innerHTML=`

    <path d="M3 3l18 18"/>

    <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"/>

    <path d="M9.9 5.1A10.7 10.7 0 0 1 12 5c7 0 11 7 11 7a18.7 18.7 0 0 1-3.4 3.8"/>

    `;

}

else{

    password.type="password";

    icon.innerHTML=`

    <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7z"/>

    <circle cx="12" cy="12" r="2.5"/>

    `;

}

}

</script>

</body>
</html>
