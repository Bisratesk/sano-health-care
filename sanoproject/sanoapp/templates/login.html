<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | SANO Health Care</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0b8fd8,#18b7b5);
}

.container{
    width:100%;
    max-width:430px;
    background:#fff;
    padding:45px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
}
.error-message{
    background:#ffe5e5;
    color:#d90429;
    border:1px solid #ffb3b3;
    padding:12px;
    margin-bottom:20px;
    border-radius:10px;
    text-align:center;
    font-weight:600;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:#0b8fd8;
    font-size:34px;
    margin-bottom:8px;
}

.logo p{
    color:#666;
    font-size:15px;
}

form{
    display:flex;
    flex-direction:column;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border:1px solid #d0d0d0;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#0b8fd8;
    box-shadow:0 0 8px rgba(11,143,216,.25);
}

button{
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0b8fd8;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0977b6;
    transform:translateY(-2px);
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:18px;
    font-size:14px;
}

.links a{
    color:#0b8fd8;
    text-decoration:none;
    font-weight:600;
}

.links a:hover{
    text-decoration:underline;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#777;
    font-size:13px;
}
.password-box{

    display:flex;
    align-items:center;
    position:relative;

}


.password-box input{

    width:100%;
    padding-right:50px;

}



.eye-btn{

    position:absolute;

    right:12px;

    width:35px;

    height:35px;

    border:none;

    background:transparent;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

}



.eye-btn svg{

    width:22px;

    height:22px;

    fill:#0077b6;

    transition:.3s;

}



.eye-btn:hover svg{

    fill:#023e8a;

    transform:scale(1.15);

}
.eye-btn{

    position:absolute;
    right:12px;

    width:35px;
    height:35px;

    padding:0;

    border:none;

    background:transparent;

    display:flex;
    align-items:center;
    justify-content:center;

}


.eye-btn:hover{

    background:transparent;

    transform:none;

}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <h1>SANO</h1>
        <p>Welcome Back to SANO Health Care</p>
    </div>
    {% if messages %}
    {% for message in messages %}
        <div class="error-message">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Enter your username"
            required
        >



<div class="password-box">

    <input 
    type="password"
    name="password"
    id="password"
    placeholder="Enter your password"
    required>


    <button 
    type="button"
    class="eye-btn"
    onclick="showPassword()">

        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" 
        viewBox="0 0 24 24">

            <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 
            11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 
            0-10 5 5 0 0 1 0 10z"/>

            <circle cx="12" cy="12" r="2.5"/>

        </svg>

    </button>

</div>

        <button type="submit">
            Sign In
        </button>

    </form>

    <div class="links">
        <a href="#">Forgot Password?</a>
        <a href="{% url 'register' %}">Create Account</a>
    </div>

    <div class="footer">
        © 2026 SANO Health Care. All Rights Reserved.
    </div>

</div>
<script>

function showPassword(){

let password=document.getElementById("password");
let icon=document.getElementById("eyeIcon");


if(password.type==="password"){

    password.type="text";

    icon.innerHTML=`

    <path d="M3 3l18 18"/>

    <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"/>

    <path d="M9.9 5.1A10.7 10.7 0 0 1 12 5c7 0 11 7 11 7a18.7 18.7 0 0 1-3.4 3.8"/>

    `;

}

else{

    password.type="password";

    icon.innerHTML=`

    <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7z"/>

    <circle cx="12" cy="12" r="2.5"/>

    `;

}

}




</script>
</body>
</html>
