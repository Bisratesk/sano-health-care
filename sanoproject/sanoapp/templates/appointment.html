<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment | SANO Health Care</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:60px 20px;
    overflow-x:hidden;

    background:linear-gradient(
        135deg,
        #edf9ff,
        #ffffff
    );

    position:relative;
}

/* Floating Background */

body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#00b4d8;
    border-radius:50%;
    top:-220px;
    left:-180px;
    opacity:.12;
    animation:float1 9s ease-in-out infinite alternate;
    z-index:0;
}

body::after{
    content:"";
    position:fixed;
    width:420px;
    height:420px;
    background:#0077b6;
    border-radius:50%;
    bottom:-180px;
    right:-150px;
    opacity:.10;
    animation:float2 10s ease-in-out infinite alternate;
    z-index:0;
}

@keyframes float1{
    to{
        transform:translateY(70px) scale(1.08);
    }
}

@keyframes float2{
    to{
        transform:translateY(-50px) scale(1.08);
    }
}

/* MAIN CARD */

.container{

    width:100%;
    max-width:700px;

    background:rgba(255,255,255,.96);

    backdrop-filter:blur(20px);

    border-radius:30px;

    padding:45px;

    margin-bottom:60px;

    position:relative;
    z-index:1;

    box-shadow:
        0 15px 40px rgba(0,119,182,.08),
        0 25px 70px rgba(0,0,0,.08);

    animation:appear .8s ease;
}

@keyframes appear{

from{

    opacity:0;
    transform:translateY(40px);

}

to{

    opacity:1;
    transform:translateY(0);

}

}

.container::before{

content:"❤️ ━━━ 🩺 ━━━ ❤️";

display:block;

text-align:center;

font-size:22px;

margin-bottom:20px;

animation:heartbeat 2s infinite;

}

@keyframes heartbeat{

50%{

transform:scale(1.1);

}

}

/* TITLE */

h2{

text-align:center;

font-size:38px;

font-weight:800;

color:#023e8a;

margin-bottom:30px;

}

h2::after{

content:"";

display:block;

width:110px;

height:5px;

margin:15px auto 0;

border-radius:30px;

background:linear-gradient(
90deg,
#0077b6,
#00b4d8
);

}

/* PATIENT CARD */

.patient-card{

background:#f8fcff;

border-left:6px solid #0077b6;

padding:20px;

border-radius:18px;

margin-bottom:20px;

}

.patient-card h3{

margin-top:8px;

font-size:24px;

color:#023e8a;

}

.info-box{

background:#f8fcff;

padding:18px;

border-radius:15px;

margin-bottom:25px;

border-left:5px solid #00b4d8;

}

.info-box strong{

color:#0077b6;

}

/* LABELS */

form p{

margin-bottom:18px;

}

label{

display:block;

margin-bottom:8px;

font-weight:700;

color:#023e8a;

}

/* INPUTS */

input,
select,
textarea{

width:100%;

padding:15px 18px;

font-size:16px;

border-radius:15px;

border:2px solid #dceef7;

outline:none;

transition:.3s;

background:white;

}

input:hover,
select:hover,
textarea:hover{

border-color:#90e0ef;

}

input:focus,
select:focus,
textarea:focus{

border-color:#0077b6;

box-shadow:0 10px 25px rgba(0,119,182,.18);

}

textarea{

resize:none;

min-height:120px;

}

/* BUTTON */

button{

width:100%;

padding:17px;

margin-top:20px;

border:none;

border-radius:50px;

background:linear-gradient(
135deg,
#0077b6,
#00b4d8
);

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.3s;

box-shadow:0 12px 30px rgba(0,119,182,.25);

}

button:hover{

transform:translateY(-4px);

box-shadow:0 18px 40px rgba(0,119,182,.30);

}

@media(max-width:768px){

.container{

padding:30px 25px;

}

h2{

font-size:30px;

}

}

</style>
</head>
<body>

<div class="container">

    <h2>Book Your Appointment</h2>

    <div class="patient-card">
        👤 Patient

        <h3>
            {% if request.user.first_name %}
                {{ request.user.first_name }} {{ request.user.last_name }}
            {% else %}
                {{ request.user.username }}
            {% endif %}
        </h3>
    </div>

    <form method="POST">

        {% csrf_token %}

        {% if messages %}
            {% for message in messages %}
                <div style="
                    background:#fdeaea;
                    color:#b42318;
                    padding:14px;
                    border-radius:12px;
                    margin-bottom:20px;
                    border-left:5px solid #d92d20;
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

    
     

        {{ form.as_p }}

        <button type="submit">
            Confirm Appointment
        </button>

    </form>

</div>

</body>
</html>
