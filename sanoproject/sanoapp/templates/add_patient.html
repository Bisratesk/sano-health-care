<!DOCTYPE html>
<html>

<head>

<title>SANO | Add Patient</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}


body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
        135deg,
        #f5f9fc,
        #dff4ff
    );

}


/* ===== CONTAINER ===== */


.container{

    width:450px;

    background:white;

    padding:40px;

    border-radius:25px;


    box-shadow:

    0 20px 50px rgba(0,0,0,.12);


    animation:fade .5s ease;

}



@keyframes fade{

from{

    opacity:0;

    transform:translateY(20px);

}


to{

    opacity:1;

    transform:translateY(0);

}

}



/* ===== HEADER ===== */


.logo{

    text-align:center;

    font-size:32px;

    font-weight:900;

    color:#023e8a;

    margin-bottom:10px;

}



.subtitle{

    text-align:center;

    color:#64748b;

    margin-bottom:30px;

    font-size:14px;

}



h2{

    color:#023e8a;

    text-align:center;

    margin-bottom:25px;

    font-size:26px;

}





/* ===== FORM ===== */


form p{

    margin-bottom:18px;

}



label{

    display:block;

    font-weight:700;

    color:#374151;

    margin-bottom:7px;

}



input,select{


    width:100%;


    padding:14px 15px;


    border:1px solid #d1d5db;


    border-radius:12px;


    outline:none;


    font-size:15px;


    transition:.3s;


}



input:focus,
select:focus{


    border-color:#0077b6;


    box-shadow:

    0 0 0 4px rgba(0,119,182,.15);


}





/* ===== BUTTON ===== */


button{


    margin-top:15px;


    width:100%;


    padding:15px;


    border:none;


    border-radius:12px;


    background:

    linear-gradient(
        135deg,
        #023e8a,
        #0077b6
    );


    color:white;


    font-size:16px;


    font-weight:700;


    cursor:pointer;


    transition:.3s;


}



button:hover{


    transform:translateY(-3px);


    box-shadow:

    0 10px 25px rgba(0,119,182,.3);


}




/* ===== BACK LINK ===== */


.back{


    display:block;


    text-align:center;


    margin-top:20px;


    text-decoration:none;


    color:#0077b6;


    font-weight:600;


}



.back:hover{

    text-decoration:underline;

}




/* ===== MOBILE ===== */


@media(max-width:500px){


.container{

    width:90%;

    padding:30px;

}


}


</style>


</head>


<body>



<div class="container">


<div class="logo">

🏥 SANO

</div>


<div class="subtitle">

Healthcare Management System

</div>



<h2>
Add New Patient
</h2>



<form method="POST">


{% csrf_token %}


{{form.as_p}}



<button type="submit">

➕ Add Patient

</button>



</form>



<a href="{% url 'admin_dashboard' %}" class="back">

← Back to Dashboard

</a>



</div>



</body>


</html>
